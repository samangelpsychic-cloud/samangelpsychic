<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sam Angel — TikTok connect</title>
<style>
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    background:#1a1226;color:#f3ecf7;display:flex;min-height:100vh;
    align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
  .card{max-width:560px;width:100%;background:#241733;border:1px solid #3a2b4d;
    border-radius:18px;padding:28px;text-align:center}
  h1{font-size:22px;margin:0 0 8px;color:#cdab6b}
  p{color:#bcafc6;line-height:1.6}
  .code{user-select:all;word-break:break-all;background:#160f20;border:1px solid #3a2b4d;
    border-radius:12px;padding:16px;margin:16px 0;font-size:15px;color:#fff}
  button{background:#cdab6b;color:#1a1226;border:0;border-radius:10px;
    padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer}
  .err{color:#d07f7f}
</style>
</head>
<body>
<div class="card">
  <h1>✦ Sam Angel — TikTok connect</h1>
  <div id="out"><p>Reading your login code…</p></div>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const code = p.get("code");
  const err = p.get("error") || p.get("error_description");
  const out = document.getElementById("out");
  if (code) {
    out.innerHTML =
      '<p>✅ Connected! Copy the whole code below and paste it back to Claude:</p>' +
      '<div class="code" id="c">' + code + '</div>' +
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'c\').innerText)">Copy code</button>';
  } else {
    out.innerHTML = '<p class="err">No code found. ' +
      (err ? ('Error: ' + err) : 'Please open the TikTok login link from Claude again.') + '</p>';
  }
</script>
</body>
</html>
